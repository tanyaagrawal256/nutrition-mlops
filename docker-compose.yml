version: "3.9"

services:
  api:
    build: ./backend
    container_name: nutrition-api
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    restart: always